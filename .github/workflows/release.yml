name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    env:
      PLUGIN_SLUG: ghl-crm-integration
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
          coverage: none

      - name: Validate release exclusions
        run: |
          grep -q "${PLUGIN_SLUG}/tests/\*" zip-exclude.txt
          grep -q "${PLUGIN_SLUG}/build-minify.php" zip-exclude.txt
          grep -q "${PLUGIN_SLUG}/.github/\*" zip-exclude.txt
          grep -q "${PLUGIN_SLUG}/.gitignore" zip-exclude.txt
          grep -q "${PLUGIN_SLUG}/build/\*" zip-exclude.txt
          grep -q "${PLUGIN_SLUG}/dist/\*" zip-exclude.txt

      - name: Build production zip
        run: |
          set -euo pipefail
          STAGING_ROOT="${RUNNER_TEMP}/ghl-crm-release"
          STAGING_DIR="${STAGING_ROOT}/${PLUGIN_SLUG}"
          ARTIFACT_DIR="${RUNNER_TEMP}/ghl-crm-dist"

          rm -rf "${STAGING_ROOT}" "${ARTIFACT_DIR}"
          mkdir -p "${STAGING_DIR}" "${ARTIFACT_DIR}"
          rsync -a --delete --exclude '.git/' ./ "${STAGING_DIR}/"

          (
            cd "${STAGING_DIR}"
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
          )

          (
            cd "${STAGING_ROOT}"
            zip -r "${ARTIFACT_DIR}/${PLUGIN_SLUG}-${GITHUB_REF_NAME}.zip" ${PLUGIN_SLUG} \
            -x@"${GITHUB_WORKSPACE}/zip-exclude.txt" \
            -x "${PLUGIN_SLUG}/tests/*" \
            -x "${PLUGIN_SLUG}/build-minify.php"
          )

          mkdir -p dist
          cp "${ARTIFACT_DIR}/${PLUGIN_SLUG}-${GITHUB_REF_NAME}.zip" dist/
          ls -lah dist/

      - name: Validate release artifact
        run: |
          unzip -l dist/${PLUGIN_SLUG}-${GITHUB_REF_NAME}.zip | grep -q "${PLUGIN_SLUG}/vendor/autoload.php"
          ! unzip -l dist/${PLUGIN_SLUG}-${GITHUB_REF_NAME}.zip | grep -q "${PLUGIN_SLUG}/.git/"
          ! unzip -l dist/${PLUGIN_SLUG}-${GITHUB_REF_NAME}.zip | grep -q "${PLUGIN_SLUG}/.github/"
          ! unzip -l dist/${PLUGIN_SLUG}-${GITHUB_REF_NAME}.zip | grep -q "${PLUGIN_SLUG}/.gitignore"
          ! unzip -l dist/${PLUGIN_SLUG}-${GITHUB_REF_NAME}.zip | grep -q "${PLUGIN_SLUG}/build/"
          ! unzip -l dist/${PLUGIN_SLUG}-${GITHUB_REF_NAME}.zip | grep -q "${PLUGIN_SLUG}/dist/"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: 'dist/*.zip'
          generate_release_notes: true
