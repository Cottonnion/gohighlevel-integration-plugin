name: Release — Syncly

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v1.4.2'
        required: true
        type: string

jobs:
  build-release:
    name: Build production ZIP and publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PLUGIN_SLUG: syncly
      DIST_DIR: ${{ github.workspace }}/dist

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer:v2
          coverage: none

      - name: Setup Node.js for asset minification
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve release tag
        id: release_tag
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ inputs.tag }}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi

          if ! printf '%s' "${RELEASE_TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-.][A-Za-z0-9.]+)?$'; then
            echo "Release tag must look like v1.4.2. Got: ${RELEASE_TAG}" >&2
            exit 1
          fi

          echo "tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "zip_name=${PLUGIN_SLUG}-${RELEASE_TAG}.zip" >> "${GITHUB_OUTPUT}"

      - name: Validate Composer metadata
        run: composer validate --strict --no-check-publish

      - name: PHP syntax check
        run: |
          find . \
            -path './vendor' -prune -o \
            -path './.git' -prune -o \
            -name '*.php' -print0 \
            | xargs -0 -n1 php -l

      - name: Verify external service URLs
        run: |
          curl --fail --location --silent --show-error --head https://labgenz.com/terms-of-service/ >/dev/null
          curl --fail --location --silent --show-error --head https://labgenz.com/privacy-policy/ >/dev/null

      - name: Check review-flagged patterns
        run: |
          ! grep -RInE --exclude-dir=.git --exclude-dir=.github --exclude-dir=docs --exclude-dir=vendor "ghl_sync_lock_|ghl_last_login_|ghl_rest_api_rate_|ghl_bulk_import_progress" .
          ! grep -RInE --exclude-dir=.git --exclude-dir=.github --exclude-dir=docs --exclude-dir=vendor "hash_hmac\( 'sha256', \$contact_id, \$secret|HMAC_SHA256_SECRET_CONTACT_ID|YOUR_HMAC" .
          ! grep -RInE --exclude-dir=.git --exclude-dir=.github --exclude-dir=docs --exclude-dir=vendor "syncly_register_advanced_restriction_hooks|syncly_archive_protection_enabled|syncly_restriction_overrides_enabled|overrides_pro_active" .
          ! grep -RInE "persist_guest_contact\( \$contact_id \);" -- src/Frontend/ContactIdHandler.php
          grep -F "Tested up to: 7.0" readme.txt
          test -d languages
          grep -F "https://labgenz.com/terms-of-service/" readme.txt
          grep -F "https://labgenz.com/privacy-policy/" readme.txt

      - name: Stage production plugin files
        run: |
          set -euo pipefail
          BUILD_ROOT="${RUNNER_TEMP}/syncly-release"
          STAGING_DIR="${BUILD_ROOT}/${PLUGIN_SLUG}"

          rm -rf "${BUILD_ROOT}" "${DIST_DIR}"
          mkdir -p "${STAGING_DIR}" "${DIST_DIR}"

          rsync -a --delete ./ "${STAGING_DIR}/" \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'docs/' \
            --exclude 'tests/' \
            --exclude 'dist/' \
            --exclude 'build/' \
            --exclude 'node_modules/' \
            --exclude 'vendor/' \
            --exclude '.gitignore' \
            --exclude '.gitattributes' \
            --exclude '.editorconfig' \
            --exclude '.phpunit.result.cache' \
            --exclude 'phpunit.xml' \
            --exclude 'phpunit.xml.dist' \
            --exclude 'phpcs.xml' \
            --exclude 'phpcs.xml.dist' \
            --exclude 'build-minify.php' \
            --exclude 'check' \
            --exclude 'fix' \
            --exclude 'zip-exclude.txt' \
            --exclude 'zip-excludes.txt' \
            --exclude 'README.md' \
            --exclude 'DEV_CHANGELOG.md' \
            --exclude 'FEATURES-AND-BENEFITS.md' \
            --exclude 'PRODUCTION-BUILD.md' \
            --exclude '*.zip' \
            --exclude '*.map' \
            --exclude '.DS_Store'

      - name: Install production Composer dependencies
        run: |
          cd "${RUNNER_TEMP}/syncly-release/${PLUGIN_SLUG}"
          composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader --classmap-authoritative
          test -f vendor/autoload.php
          test ! -d vendor/bin

      - name: Minify production assets
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/syncly-release/${PLUGIN_SLUG}"
          npm_config_yes=true npx --package terser terser --version
          npm_config_yes=true npx --package clean-css-cli cleancss --version

          while IFS= read -r -d '' file; do
            output="${file%.js}.min.js"
            echo "Minifying ${file} -> ${output}"
            npm_config_yes=true npx --package terser terser "${file}" --compress --mangle --comments false --output "${output}"
          done < <(find assets -type f -name '*.js' ! -name '*.min.js' -print0)

          while IFS= read -r -d '' file; do
            output="${file%.css}.min.css"
            echo "Minifying ${file} -> ${output}"
            npm_config_yes=true npx --package clean-css-cli cleancss -O2 --format breakWith=lf --output "${output}" "${file}"
          done < <(find assets -type f -name '*.css' ! -name '*.min.css' -print0)

      - name: Build production zip
        run: |
          set -euo pipefail
          BUILD_ROOT="${RUNNER_TEMP}/syncly-release"
          (
            cd "${BUILD_ROOT}"
            zip -r "${DIST_DIR}/${{ steps.release_tag.outputs.zip_name }}" "${PLUGIN_SLUG}" \
              -x "${PLUGIN_SLUG}/.git/*" \
              -x "${PLUGIN_SLUG}/.github/*" \
              -x "${PLUGIN_SLUG}/docs/*" \
              -x "${PLUGIN_SLUG}/tests/*" \
              -x "${PLUGIN_SLUG}/dist/*" \
              -x "${PLUGIN_SLUG}/build/*" \
              -x "${PLUGIN_SLUG}/node_modules/*" \
              -x "${PLUGIN_SLUG}/vendor/bin/*" \
              -x "${PLUGIN_SLUG}/.gitignore" \
              -x "${PLUGIN_SLUG}/.gitattributes" \
              -x "${PLUGIN_SLUG}/.editorconfig" \
              -x "${PLUGIN_SLUG}/.phpunit.result.cache" \
              -x "${PLUGIN_SLUG}/phpunit.xml" \
              -x "${PLUGIN_SLUG}/phpunit.xml.dist" \
              -x "${PLUGIN_SLUG}/phpcs.xml" \
              -x "${PLUGIN_SLUG}/phpcs.xml.dist" \
              -x "${PLUGIN_SLUG}/build-minify.php" \
              -x "${PLUGIN_SLUG}/check" \
              -x "${PLUGIN_SLUG}/fix" \
              -x "${PLUGIN_SLUG}/zip-exclude.txt" \
              -x "${PLUGIN_SLUG}/zip-excludes.txt" \
              -x "${PLUGIN_SLUG}/README.md" \
              -x "${PLUGIN_SLUG}/DEV_CHANGELOG.md" \
              -x "${PLUGIN_SLUG}/FEATURES-AND-BENEFITS.md" \
              -x "${PLUGIN_SLUG}/PRODUCTION-BUILD.md" \
              -x "${PLUGIN_SLUG}/*.zip" \
              -x "${PLUGIN_SLUG}/*.map" \
              -x "*.DS_Store"
          )
          unzip -Z1 "${DIST_DIR}/${{ steps.release_tag.outputs.zip_name }}" > "${DIST_DIR}/zip-contents.txt"
          ls -lah "${DIST_DIR}"

      - name: Validate release artifact
        run: |
          set -euo pipefail
          ZIP_FILE="${DIST_DIR}/${{ steps.release_tag.outputs.zip_name }}"

          grep -q "${PLUGIN_SLUG}/syncly.php" "${DIST_DIR}/zip-contents.txt"
          grep -q "${PLUGIN_SLUG}/readme.txt" "${DIST_DIR}/zip-contents.txt"
          grep -q "${PLUGIN_SLUG}/vendor/autoload.php" "${DIST_DIR}/zip-contents.txt"
          grep -q "${PLUGIN_SLUG}/vendor/woocommerce/action-scheduler/" "${DIST_DIR}/zip-contents.txt"
          grep -q "${PLUGIN_SLUG}/assets/.*\.min\.js" "${DIST_DIR}/zip-contents.txt"
          grep -q "${PLUGIN_SLUG}/assets/.*\.min\.css" "${DIST_DIR}/zip-contents.txt"

          ! grep -E "${PLUGIN_SLUG}/(\.git|\.github|docs|tests|dist|build|node_modules)/" "${DIST_DIR}/zip-contents.txt"
          ! grep -E "${PLUGIN_SLUG}/(\.gitignore|\.gitattributes|\.editorconfig|\.phpunit\.result\.cache|phpunit\.xml|phpunit\.xml\.dist|phpcs\.xml|phpcs\.xml\.dist|build-minify\.php|check|fix|zip-excludes?\.txt|README\.md|DEV_CHANGELOG\.md|FEATURES-AND-BENEFITS\.md|PRODUCTION-BUILD\.md)$" "${DIST_DIR}/zip-contents.txt"
          ! grep -E "${PLUGIN_SLUG}/vendor/bin/" "${DIST_DIR}/zip-contents.txt"
          ! grep -E "\.DS_Store|\.map$|\.zip$" "${DIST_DIR}/zip-contents.txt"
          test -s "${ZIP_FILE}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/${{ steps.release_tag.outputs.zip_name }}
            dist/zip-contents.txt
          generate_release_notes: true

  deploy-wporg:
    name: Deploy to WordPress.org SVN
    needs: build-release
    runs-on: ubuntu-latest
    env:
      PLUGIN_SLUG: syncly
      WPORG_USERNAME: yahyadeved
      SVN_URL: https://plugins.svn.wordpress.org/syncly

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release_tag
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ inputs.tag }}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${RELEASE_TAG#v}" >> "${GITHUB_OUTPUT}"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer:v2
          coverage: none

      - name: Install production Composer dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader --classmap-authoritative

      - name: Install SVN
        run: sudo apt-get update -q && sudo apt-get install -y subversion

      - name: Checkout SVN trunk
        run: |
          set -euo pipefail
          svn checkout --depth immediates "${SVN_URL}" /tmp/svn-repo
          svn update --set-depth infinity /tmp/svn-repo/trunk
          svn update --set-depth infinity /tmp/svn-repo/assets || true

      - name: Sync plugin files to SVN trunk
        run: |
          set -euo pipefail
          STAGING="${RUNNER_TEMP}/syncly-svn"
          mkdir -p "${STAGING}"

          rsync -a --delete ./ "${STAGING}/" \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'docs/' \
            --exclude 'tests/' \
            --exclude 'dist/' \
            --exclude 'build/' \
            --exclude 'node_modules/' \
            --exclude 'vendor/' \
            --exclude '.gitignore' \
            --exclude '.gitattributes' \
            --exclude '.editorconfig' \
            --exclude '.phpunit.result.cache' \
            --exclude 'phpunit.xml' \
            --exclude 'phpunit.xml.dist' \
            --exclude 'phpcs.xml' \
            --exclude 'phpcs.xml.dist' \
            --exclude 'build-minify.php' \
            --exclude 'check' \
            --exclude 'fix' \
            --exclude 'zip-exclude.txt' \
            --exclude 'zip-excludes.txt' \
            --exclude 'README.md' \
            --exclude 'DEV_CHANGELOG.md' \
            --exclude 'FEATURES-AND-BENEFITS.md' \
            --exclude 'PRODUCTION-BUILD.md' \
            --exclude '*.zip' \
            --exclude '*.map' \
            --exclude '.DS_Store'

          # Re-install production-only vendor
          composer install --working-dir="${STAGING}" --no-dev --prefer-dist --no-interaction --optimize-autoloader --classmap-authoritative

          rsync -a --delete "${STAGING}/" /tmp/svn-repo/trunk/ \
            --exclude '.svn/'

      - name: Stage SVN changes (add new / remove deleted)
        run: |
          cd /tmp/svn-repo
          svn status | grep '^?' | awk '{print $2}' | xargs -r svn add --force
          svn status | grep '^!'  | awk '{print $2}' | xargs -r svn delete --force

      - name: Create SVN tag for this version
        run: |
          set -euo pipefail
          VERSION="${{ steps.release_tag.outputs.version }}"
          TAG_URL="${SVN_URL}/tags/${VERSION}"

          # Only create if not already present
          if ! svn ls "${TAG_URL}" > /dev/null 2>&1; then
            svn copy /tmp/svn-repo/trunk "${TAG_URL}" \
              --parents \
              --message "Tagging version ${VERSION}"
          fi

      - name: Commit to SVN
        env:
          WPORG_SVN_PASSWORD: ${{ secrets.WPORG_SVN_PASSWORD }}
        run: |
          set -euo pipefail
          cd /tmp/svn-repo
          svn commit \
            --username "${WPORG_USERNAME}" \
            --password "${WPORG_SVN_PASSWORD}" \
            --non-interactive \
            --message "Release ${{ steps.release_tag.outputs.tag }}"
