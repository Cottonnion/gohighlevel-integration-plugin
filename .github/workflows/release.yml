name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    env:
      PLUGIN_SLUG: ghl-crm-integration
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
          coverage: none

      - name: Validate release exclusions
        run: |
          grep -q "${PLUGIN_SLUG}/tests/\*" zip-exclude.txt
          grep -q "${PLUGIN_SLUG}/build-minify.php" zip-exclude.txt

      - name: Build production zip
        run: |
          set -euo pipefail
          mkdir -p build/${PLUGIN_SLUG} dist
          rsync -a --delete --exclude '.git/' ./ build/${PLUGIN_SLUG}/

          (
            cd build/${PLUGIN_SLUG}
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
          )

          (
            cd build
            zip -r ../dist/${PLUGIN_SLUG}-${GITHUB_REF_NAME}.zip ${PLUGIN_SLUG} \
            -x@../zip-exclude.txt \
            -x "${PLUGIN_SLUG}/tests/*" \
            -x "${PLUGIN_SLUG}/build-minify.php"
          )

          ls -lah dist/

      - name: Validate release artifact
        run: |
          unzip -l dist/${PLUGIN_SLUG}-${GITHUB_REF_NAME}.zip | grep -q "${PLUGIN_SLUG}/vendor/autoload.php"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: 'dist/*.zip'
          generate_release_notes: true
