name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            DEPLOY_PATH="${{ secrets.SSH_PATH }}"
            REPO_URL="https://Cottonnion:${{ secrets.GH_TOKEN }}@github.com/Cottonnion/gohighlevel-integration-plugin.git"

            if [ -d "${DEPLOY_PATH}/.git" ]; then
              cd "${DEPLOY_PATH}"
              git fetch origin
              git reset --hard origin/main
            else
              rm -rf "${DEPLOY_PATH}"
              git clone "${REPO_URL}" "${DEPLOY_PATH}"
              cd "${DEPLOY_PATH}"
            fi

            # Resolve composer — cPanel servers often have it under a versioned path
            if command -v composer &>/dev/null; then
              COMPOSER="composer"
            elif [ -f /usr/local/bin/composer ]; then
              COMPOSER="/usr/local/bin/composer"
            else
              COMPOSER=$(find /opt /usr/local /home -name 'composer' -type f 2>/dev/null | head -1)
            fi

            ${COMPOSER} install --no-dev --optimize-autoloader --no-interaction
