name: WordPress.org Production Package

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  build-wordpress-org-package:
    name: Build WordPress.org package
    runs-on: ubuntu-latest
    env:
      PLUGIN_SLUG: syncly
      DIST_DIR: ${{ github.workspace }}/dist

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          coverage: none
          tools: composer:v2

      - name: Setup Node.js for asset minification
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Composer metadata
        run: composer validate --strict --no-check-publish

      - name: PHP syntax check
        run: |
          find . \
            -path './vendor' -prune -o \
            -path './.git' -prune -o \
            -name '*.php' -print0 \
            | xargs -0 -n1 php -l

      - name: Verify external service URLs
        run: |
          curl --fail --location --silent --show-error --head https://labgenz.com/terms-of-service/ >/dev/null
          curl --fail --location --silent --show-error --head https://labgenz.com/privacy-policy/ >/dev/null

      - name: Check review-flagged prefixes and public contact flow
        run: |
          ! grep -RInE --exclude-dir=.git --exclude-dir=.github --exclude-dir=docs --exclude-dir=vendor "ghl_sync_lock_|ghl_last_login_|ghl_rest_api_rate_|ghl_bulk_import_progress" .
          ! grep -RInE --exclude-dir=.git --exclude-dir=.github --exclude-dir=docs --exclude-dir=vendor "hash_hmac\( 'sha256', \$contact_id, \$secret|HMAC_SHA256_SECRET_CONTACT_ID|YOUR_HMAC" .
          ! grep -RInE --exclude-dir=.git --exclude-dir=.github --exclude-dir=docs --exclude-dir=vendor "syncly_register_advanced_restriction_hooks|syncly_archive_protection_enabled|syncly_restriction_overrides_enabled|overrides_pro_active" .
          ! grep -RInE "persist_guest_contact\( \$contact_id \);" -- src/Frontend/ContactIdHandler.php

      - name: Check declared service disclosures
        run: |
          grep -F "https://labgenz.com/terms-of-service/" readme.txt
          grep -F "https://labgenz.com/privacy-policy/" readme.txt

      - name: Stage production plugin files
        run: |
          set -euo pipefail
          BUILD_ROOT="${RUNNER_TEMP}/syncly-wordpress-org"
          STAGING_DIR="${BUILD_ROOT}/${PLUGIN_SLUG}"

          rm -rf "${BUILD_ROOT}" "${DIST_DIR}"
          mkdir -p "${STAGING_DIR}" "${DIST_DIR}"

          rsync -a --delete ./ "${STAGING_DIR}/" \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'docs/' \
            --exclude 'tests/' \
            --exclude 'dist/' \
            --exclude 'build/' \
            --exclude 'node_modules/' \
            --exclude 'vendor/' \
            --exclude '.gitignore' \
            --exclude '.gitattributes' \
            --exclude '.editorconfig' \
            --exclude '.phpunit.result.cache' \
            --exclude 'phpunit.xml' \
            --exclude 'phpunit.xml.dist' \
            --exclude 'phpcs.xml' \
            --exclude 'phpcs.xml.dist' \
            --exclude 'build-minify.php' \
            --exclude 'check' \
            --exclude 'fix' \
            --exclude 'zip-exclude.txt' \
            --exclude 'zip-excludes.txt' \
            --exclude 'README.md' \
            --exclude 'DEV_CHANGELOG.md' \
            --exclude 'FEATURES-AND-BENEFITS.md' \
            --exclude 'PRODUCTION-BUILD.md' \
            --exclude '*.zip' \
            --exclude '*.map' \
            --exclude '.DS_Store'

      - name: Install production Composer dependencies
        run: |
          cd "${RUNNER_TEMP}/syncly-wordpress-org/${PLUGIN_SLUG}"
          composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader --classmap-authoritative
          test -f vendor/autoload.php
          test ! -d vendor/bin

      - name: Minify production assets
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/syncly-wordpress-org/${PLUGIN_SLUG}"
          npm_config_yes=true npx --package terser terser --version
          npm_config_yes=true npx --package clean-css-cli cleancss --version

          while IFS= read -r -d '' file; do
            output="${file%.js}.min.js"
            echo "Minifying ${file} -> ${output}"
            npm_config_yes=true npx --package terser terser "${file}" --compress --mangle --comments false --output "${output}"
          done < <(find assets -type f -name '*.js' ! -name '*.min.js' -print0)

          while IFS= read -r -d '' file; do
            output="${file%.css}.min.css"
            echo "Minifying ${file} -> ${output}"
            npm_config_yes=true npx --package clean-css-cli cleancss -O2 --format breakWith=lf --output "${output}" "${file}"
          done < <(find assets -type f -name '*.css' ! -name '*.min.css' -print0)

      - name: Build production zip
        run: |
          set -euo pipefail
          BUILD_ROOT="${RUNNER_TEMP}/syncly-wordpress-org"
          (
            cd "${BUILD_ROOT}"
            zip -r "${DIST_DIR}/${PLUGIN_SLUG}-wordpress-org.zip" "${PLUGIN_SLUG}" \
              -x "${PLUGIN_SLUG}/.git/*" \
              -x "${PLUGIN_SLUG}/.github/*" \
              -x "${PLUGIN_SLUG}/docs/*" \
              -x "${PLUGIN_SLUG}/tests/*" \
              -x "${PLUGIN_SLUG}/dist/*" \
              -x "${PLUGIN_SLUG}/build/*" \
              -x "${PLUGIN_SLUG}/node_modules/*" \
              -x "${PLUGIN_SLUG}/vendor/bin/*" \
              -x "${PLUGIN_SLUG}/.gitignore" \
              -x "${PLUGIN_SLUG}/.gitattributes" \
              -x "${PLUGIN_SLUG}/.editorconfig" \
              -x "${PLUGIN_SLUG}/.phpunit.result.cache" \
              -x "${PLUGIN_SLUG}/phpunit.xml" \
              -x "${PLUGIN_SLUG}/phpunit.xml.dist" \
              -x "${PLUGIN_SLUG}/phpcs.xml" \
              -x "${PLUGIN_SLUG}/phpcs.xml.dist" \
              -x "${PLUGIN_SLUG}/build-minify.php" \
              -x "${PLUGIN_SLUG}/check" \
              -x "${PLUGIN_SLUG}/fix" \
              -x "${PLUGIN_SLUG}/zip-exclude.txt" \
              -x "${PLUGIN_SLUG}/zip-excludes.txt" \
              -x "${PLUGIN_SLUG}/README.md" \
              -x "${PLUGIN_SLUG}/DEV_CHANGELOG.md" \
              -x "${PLUGIN_SLUG}/FEATURES-AND-BENEFITS.md" \
              -x "${PLUGIN_SLUG}/PRODUCTION-BUILD.md" \
              -x "${PLUGIN_SLUG}/*.zip" \
              -x "${PLUGIN_SLUG}/*.map" \
              -x "*.DS_Store"
          )
          ls -lah "${DIST_DIR}"

      - name: Validate production zip contents
        run: |
          set -euo pipefail
          ZIP_FILE="${DIST_DIR}/${PLUGIN_SLUG}-wordpress-org.zip"
          unzip -l "${ZIP_FILE}" > "${DIST_DIR}/zip-contents.txt"

          grep -q "${PLUGIN_SLUG}/syncly.php" "${DIST_DIR}/zip-contents.txt"
          grep -q "${PLUGIN_SLUG}/readme.txt" "${DIST_DIR}/zip-contents.txt"
          grep -q "${PLUGIN_SLUG}/vendor/autoload.php" "${DIST_DIR}/zip-contents.txt"
          grep -q "${PLUGIN_SLUG}/vendor/woocommerce/action-scheduler/" "${DIST_DIR}/zip-contents.txt"
          grep -q "${PLUGIN_SLUG}/assets/.*\.min\.js" "${DIST_DIR}/zip-contents.txt"
          grep -q "${PLUGIN_SLUG}/assets/.*\.min\.css" "${DIST_DIR}/zip-contents.txt"

          ! grep -E "${PLUGIN_SLUG}/(\.git|\.github|docs|tests|dist|build|node_modules)/" "${DIST_DIR}/zip-contents.txt"
          ! grep -E "${PLUGIN_SLUG}/(\.gitignore|\.gitattributes|\.editorconfig|\.phpunit\.result\.cache|phpunit\.xml|phpunit\.xml\.dist|phpcs\.xml|phpcs\.xml\.dist|build-minify\.php|check|fix|zip-excludes?\.txt|README\.md|DEV_CHANGELOG\.md|FEATURES-AND-BENEFITS\.md|PRODUCTION-BUILD\.md)$" "${DIST_DIR}/zip-contents.txt"
          ! grep -E "${PLUGIN_SLUG}/vendor/bin/" "${DIST_DIR}/zip-contents.txt"
          ! grep -E "\.DS_Store|\.map$|\.zip$" "${DIST_DIR}/zip-contents.txt"

      - name: Upload production package artifact
        uses: actions/upload-artifact@v4
        with:
          name: syncly-wordpress-org-package
          path: |
            dist/syncly-wordpress-org.zip
            dist/zip-contents.txt
          if-no-files-found: error
